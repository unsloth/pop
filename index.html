<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Zen Merge - Oddly Satisfying</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        .ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
        }

        .score-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .score-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .score-value {
            color: #fff;
            font-size: 28px;
            font-weight: 300;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .controls {
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.2);
        }

        .tutorial {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .combo-text {
            position: fixed;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 0 0 20px currentColor;
            animation: comboFloat 1s ease-out forwards;
            z-index: 20;
        }

        @keyframes comboFloat {
            0% { transform: translate(-50%, 0) scale(0.5); opacity: 0; }
            20% { transform: translate(-50%, -20px) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -80px) scale(1); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="ui">
        <div class="score-container">
            <div class="score-label">Zen Score</div>
            <div class="score-value" id="score">0</div>
        </div>
        <div class="controls">
            <div class="btn" id="soundBtn">🔊</div>
            <div class="btn" id="resetBtn">↻</div>
        </div>
    </div>

    <div class="tutorial" id="tutorial">Tap anywhere to create bubbles • Merge same sizes</div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const tutorialEl = document.getElementById('tutorial');
        const soundBtn = document.getElementById('soundBtn');
        const resetBtn = document.getElementById('resetBtn');

        let width, height;
        let bubbles = [];
        let particles = [];
        let ripples = [];
        let score = 0;
        let soundEnabled = true;
        let combo = 0;
        let comboTimer = null;
        let audioCtx = null;

        const COLORS = [
            { bg: '#FFB3BA', glow: '#FF6B8A' },
            { bg: '#FFDFBA', glow: '#FFA94D' },
            { bg: '#FFFFBA', glow: '#FFE66D' },
            { bg: '#BAFFC9', glow: '#69DB7C' },
            { bg: '#BAE1FF', glow: '#4DABF7' },
            { bg: '#E6B3FF', glow: '#DA77F2' },
            { bg: '#FFB3E6', glow: '#F06595' },
            { bg: '#B3FFFF', glow: '#22D3EE' },
            { bg: '#FFD9B3', glow: '#FF922B' },
            { bg: '#D9B3FF', glow: '#9775FA' }
        ];

        const SIZES = [25, 35, 50, 70, 95, 125, 160, 200, 250, 310];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        // Audio system
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playPopSound(sizeIndex, intensity = 1) {
            if (!soundEnabled || !audioCtx) return;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();

            const baseFreq = 400 + (sizeIndex * 80);
            const freq = baseFreq + (Math.random() * 50);

            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(freq * 0.5, audioCtx.currentTime + 0.15);

            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(2000, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.2);

            gain.gain.setValueAtTime(0.15 * intensity, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);

            osc.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.2);
        }

        function playMergeSound(sizeIndex) {
            if (!soundEnabled || !audioCtx) return;

            const osc1 = audioCtx.createOscillator();
            const osc2 = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            const freq = 300 + (sizeIndex * 60);

            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc1.frequency.exponentialRampToValueAtTime(freq * 1.5, audioCtx.currentTime + 0.1);

            osc2.type = 'triangle';
            osc2.frequency.setValueAtTime(freq * 1.3, audioCtx.currentTime);
            osc2.frequency.exponentialRampToValueAtTime(freq * 0.8, audioCtx.currentTime + 0.15);

            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);

            osc1.connect(gain);
            osc2.connect(gain);
            gain.connect(audioCtx.destination);

            osc1.start(audioCtx.currentTime);
            osc2.start(audioCtx.currentTime);
            osc1.stop(audioCtx.currentTime + 0.3);
            osc2.stop(audioCtx.currentTime + 0.3);
        }

        // Classes
        class Bubble {
            constructor(x, y, sizeIndex = 0) {
                this.x = x;
                this.y = y;
                this.sizeIndex = sizeIndex;
                this.radius = 0;
                this.targetRadius = SIZES[sizeIndex];
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.color = COLORS[sizeIndex % COLORS.length];
                this.pulse = 0;
                this.pulseSpeed = 0.02 + Math.random() * 0.02;
                this.spawnTime = Date.now();
                this.merging = false;
                this.mergeScale = 1;
            }

            update() {
                // Spawn animation
                if (this.radius < this.targetRadius) {
                    this.radius += (this.targetRadius - this.radius) * 0.1;
                }

                // Pulse animation
                this.pulse += this.pulseSpeed;

                // Physics
                if (!this.merging) {
                    this.vy += 0.08; // gravity
                    this.vx *= 0.995;
                    this.vy *= 0.995;

                    this.x += this.vx;
                    this.y += this.vy;

                    // Wall bounce
                    if (this.x - this.radius < 0) {
                        this.x = this.radius;
                        this.vx *= -0.7;
                    }
                    if (this.x + this.radius > width) {
                        this.x = width - this.radius;
                        this.vx *= -0.7;
                    }
                    if (this.y - this.radius < 0) {
                        this.y = this.radius;
                        this.vy *= -0.7;
                    }
                    if (this.y + this.radius > height) {
                        this.y = height - this.radius;
                        this.vy *= -0.6;
                        this.vx *= 0.9; // friction on floor
                    }
                } else {
                    // Merge animation
                    this.mergeScale += (1 - this.mergeScale) * 0.15;
                    if (Math.abs(this.mergeScale - 1) < 0.01) {
                        this.merging = false;
                        this.mergeScale = 1;
                    }
                }
            }

            draw(ctx) {
                const pulseScale = 1 + Math.sin(this.pulse) * 0.03;
                const r = this.radius * this.mergeScale * pulseScale;

                ctx.save();
                ctx.translate(this.x, this.y);

                // Outer glow
                const gradient = ctx.createRadialGradient(0, 0, r * 0.3, 0, 0, r * 1.5);
                gradient.addColorStop(0, this.color.bg + '40');
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(0, 0, r * 1.5, 0, Math.PI * 2);
                ctx.fill();

                // Main bubble
                const bubbleGrad = ctx.createRadialGradient(
                    -r * 0.3, -r * 0.3, r * 0.1,
                    0, 0, r
                );
                bubbleGrad.addColorStop(0, '#ffffff');
                bubbleGrad.addColorStop(0.2, this.color.bg);
                bubbleGrad.addColorStop(0.8, this.color.glow);
                bubbleGrad.addColorStop(1, this.color.glow + '80');

                ctx.fillStyle = bubbleGrad;
                ctx.beginPath();
                ctx.arc(0, 0, r, 0, Math.PI * 2);
                ctx.fill();

                // Highlight
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.beginPath();
                ctx.ellipse(-r * 0.35, -r * 0.35, r * 0.25, r * 0.15, -Math.PI / 4, 0, Math.PI * 2);
                ctx.fill();

                // Secondary highlight
                ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
                ctx.beginPath();
                ctx.arc(r * 0.3, r * 0.3, r * 0.1, 0, Math.PI * 2);
                ctx.fill();

                // Size indicator (subtle)
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.font = `bold ${r * 0.4}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.sizeIndex + 1, 0, 0);

                ctx.restore();
            }

            getMass() {
                return this.radius * this.radius;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.life = 1;
                this.decay = 0.02 + Math.random() * 0.02;
                this.radius = 3 + Math.random() * 5;
                this.color = color;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.1;
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.life -= this.decay;
                this.radius *= 0.98;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class Ripple {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = 100;
                this.life = 1;
            }

            update() {
                this.radius += 3;
                this.life -= 0.03;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.life * 0.3;
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }
        }

        class FloatingParticle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.radius = 1 + Math.random() * 2;
                this.alpha = 0.1 + Math.random() * 0.3;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        const bgParticles = Array.from({ length: 30 }, () => new FloatingParticle());

        function spawnBubble(x, y, sizeIndex = 0) {
            initAudio();
            const bubble = new Bubble(x, y, sizeIndex);
            bubbles.push(bubble);
            playPopSound(sizeIndex, 0.5);

            ripples.push(new Ripple(x, y));

            // Hide tutorial after first tap
            if (tutorialEl.style.display !== 'none') {
                tutorialEl.style.display = 'none';
            }
        }

        function createMergeParticles(x, y, color) {
            for (let i = 0; i < 12; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function showComboText(x, y, text) {
            const el = document.createElement('div');
            el.className = 'combo-text';
            el.textContent = text;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            el.style.color = COLORS[Math.floor(Math.random() * COLORS.length)].glow;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        function mergeBubbles(b1, b2) {
            if (b1.merging || b2.merging) return;
            if (b1.sizeIndex >= SIZES.length - 1) return;

            const newSizeIndex = b1.sizeIndex + 1;
            const midX = (b1.x + b2.x) / 2;
            const midY = (b1.y + b2.y) / 2;

            // Create new merged bubble
            const newBubble = new Bubble(midX, midY, newSizeIndex);
            newBubble.vx = (b1.vx * b1.getMass() + b2.vx * b2.getMass()) / (b1.getMass() + b2.getMass());
            newBubble.vy = (b1.vy * b1.getMass() + b2.vy * b2.getMass()) / (b1.getMass() + b2.getMass());
            newBubble.merging = true;
            newBubble.mergeScale = 0.5;

            // Remove old bubbles
            bubbles = bubbles.filter(b => b !== b1 && b !== b2);
            bubbles.push(newBubble);

            // Effects
            createMergeParticles(midX, midY, b1.color.glow);
            playMergeSound(newSizeIndex);

            // Score
            const points = (newSizeIndex + 1) * 10;
            score += points;
            scoreEl.textContent = score.toLocaleString();

            // Combo system
            combo++;
            if (combo > 1) {
                showComboText(midX, midY, `${combo}x COMBO! +${points}`);
                if (navigator.vibrate) navigator.vibrate(20);
            }

            clearTimeout(comboTimer);
            comboTimer = setTimeout(() => { combo = 0; }, 1500);

            // Haptic
            if (navigator.vibrate) navigator.vibrate(10);
        }

        function checkCollisions() {
            for (let i = 0; i < bubbles.length; i++) {
                for (let j = i + 1; j < bubbles.length; j++) {
                    const b1 = bubbles[i];
                    const b2 = bubbles[j];

                    const dx = b2.x - b1.x;
                    const dy = b2.y - b1.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const minDist = b1.radius + b2.radius;

                    if (dist < minDist) {
                        // Check if same size for merge
                        if (b1.sizeIndex === b2.sizeIndex && !b1.merging && !b2.merging) {
                            mergeBubbles(b1, b2);
                            return; // Prevent further checks this frame
                        }

                        // Physics collision
                        const angle = Math.atan2(dy, dx);
                        const sin = Math.sin(angle);
                        const cos = Math.cos(angle);

                        // Rotate velocities
                        const vx1 = b1.vx * cos + b1.vy * sin;
                        const vy1 = b1.vy * cos - b1.vx * sin;
                        const vx2 = b2.vx * cos + b2.vy * sin;
                        const vy2 = b2.vy * cos - b2.vx * sin;

                        // Collision reaction
                        const m1 = b1.getMass();
                        const m2 = b2.getMass();
                        const vx1Final = ((m1 - m2) * vx1 + 2 * m2 * vx2) / (m1 + m2);
                        const vx2Final = ((m2 - m1) * vx2 + 2 * m1 * vx1) / (m1 + m2);

                        // Update velocities
                        b1.vx = vx1Final * cos - vy1 * sin;
                        b1.vy = vy1 * cos + vx1Final * sin;
                        b2.vx = vx2Final * cos - vy2 * sin;
                        b2.vy = vy2 * cos + vx2Final * sin;

                        // Separate bubbles
                        const overlap = minDist - dist;
                        const sepX = (overlap * cos) / 2;
                        const sepY = (overlap * sin) / 2;
                        b1.x -= sepX;
                        b1.y -= sepY;
                        b2.x += sepX;
                        b2.y += sepY;

                        // Damping
                        b1.vx *= 0.9;
                        b1.vy *= 0.9;
                        b2.vx *= 0.9;
                        b2.vy *= 0.9;
                    }
                }
            }
        }

        function handleInput(x, y) {
            initAudio();

            // Check if tapped on existing bubble
            let tappedBubble = null;
            for (let i = bubbles.length - 1; i >= 0; i--) {
                const b = bubbles[i];
                const dx = x - b.x;
                const dy = y - b.y;
                if (Math.sqrt(dx * dx + dy * dy) < b.radius) {
                    tappedBubble = b;
                    break;
                }
            }

            if (tappedBubble) {
                // Pop the bubble with particles
                createMergeParticles(tappedBubble.x, tappedBubble.y, tappedBubble.color.glow);
                playPopSound(tappedBubble.sizeIndex, 1);
                bubbles = bubbles.filter(b => b !== tappedBubble);
                score += 5;
                scoreEl.textContent = score.toLocaleString();
                if (navigator.vibrate) navigator.vibrate(15);
            } else {
                spawnBubble(x, y);
            }
        }

        // Input handlers
        canvas.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            handleInput(e.clientX, e.clientY);
        });

        soundBtn.addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            soundBtn.textContent = soundEnabled ? '🔊' : '🔇';
            initAudio();
        });

        resetBtn.addEventListener('click', () => {
            bubbles = [];
            particles = [];
            ripples = [];
            score = 0;
            scoreEl.textContent = '0';
            combo = 0;
            tutorialEl.style.display = 'block';
        });

        // Game loop
        function animate() {
            ctx.clearRect(0, 0, width, height);

            // Background particles
            bgParticles.forEach(p => {
                p.update();
                p.draw(ctx);
            });

            // Ripples
            ripples = ripples.filter(r => {
                r.update();
                r.draw(ctx);
                return r.life > 0;
            });

            // Bubbles
            bubbles.forEach(b => {
                b.update();
                b.draw(ctx);
            });

            checkCollisions();

            // Particles
            particles = particles.filter(p => {
                p.update();
                p.draw(ctx);
                return p.life > 0;
            });

            requestAnimationFrame(animate);
        }

        animate();

        // Initial demo bubbles
        setTimeout(() => {
            if (bubbles.length === 0) {
                spawnBubble(width * 0.3, height * 0.3);
                spawnBubble(width * 0.7, height * 0.3);
            }
        }, 500);
    </script>
</body>
</html>
